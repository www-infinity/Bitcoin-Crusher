name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main", "copilot/**" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GHP token into runtime config
        env:
          GHP: ${{ secrets.GHP }}
        run: |
          node -e "
            const t = process.env.GHP || '';
            require('fs').writeFileSync(
              'assets/cfg.js',
              '// Auto-generated by CI — do not edit manually.\n' +
              'window.BITCOIN_CRUSHER_TOKEN = ' + JSON.stringify(t) + ';\n'
            );
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
